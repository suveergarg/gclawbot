services:
  ollama:
    image: ollama/ollama
    runtime: nvidia
    environment:
      - NVIDIA_VISIBLE_DEVICES=all
      - OLLAMA_HOST=0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - openclaw_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 90s

  openclaw:
    build:
      context: .
      dockerfile: Dockerfile
    image: gclawbot-openclaw
    depends_on:
      ollama:
        condition: service_healthy
    ports:
      - "127.0.0.1:18789:18789"
    volumes:
      - ./data/openclaw:/home/node
      - ./skills:/home/node/.openclaw/skills:ro
    environment:
      - OPENCLAW_HOME_VOLUME=1
      - OLLAMA_BASE_URL=${OLLAMA_BASE_URL:-http://ollama:11434}
      - OLLAMA_API_KEY=${OLLAMA_API_KEY:-placeholder}
    networks:
      - openclaw_net
    restart: unless-stopped
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  ollama_data:

networks:
  openclaw_net:
    driver: bridge
